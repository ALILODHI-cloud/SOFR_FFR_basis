name: Deploy SONIA dashboard to GitHub Pages

on:
  push:
    branches: [main, cursor/sonia-dashboard-3cf3]
    paths:
      - 'docs/**'
      - 'sonia_dashboard_data.json'
      - 'build_sonia_dashboard.py'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild dashboard if data present
        run: |
          if [ -f sonia_dashboard_data.json ]; then
            python3 build_sonia_dashboard.py
            cp sonia_dashboard.html docs/index.html
            cp sonia_dashboard.html docs/sonia_dashboard.html
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
