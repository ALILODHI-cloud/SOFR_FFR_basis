name: 1M SONIA curve — fetch, build, deploy

on:
  push:
    branches: [main]
    paths:
      - 'analyze_sonia_1m.py'
      - 'analyze_sonia.py'
      - 'analyze_stir_curves.py'
      - 'analyze_jul27_dec26_trade.py'
      - 'analyze_spread_trades.py'
      - 'build_sonia_1m_dashboard.py'
      - 'build_trade_tracker.py'
      - 'trades/**'
      - 'requirements-sonia.txt'
      - '.github/workflows/sonia-1m-pages.yml'
  schedule:
    # Weekdays: ~10:00 London + ~18:30 London (post ICE close)
    - cron: "0 9 * * 1-5"
    - cron: "30 17 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sonia-1m-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements-sonia.txt
          playwright install chromium

      - name: Fetch Barchart + rebuild 1M SONIA dashboard
        run: |
          python analyze_sonia_1m.py || echo "::warning::Barchart fetch failed; building from committed snapshot"
          python build_sonia_1m_dashboard.py
          python analyze_spread_trades.py || echo "::warning::Trade mark failed"
          python build_trade_tracker.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Commit refreshed data (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sonia_1m_data.json sonia_1m_dashboard.html docs/sonia_1m_dashboard.html docs/portal.html docs/trade_tracker.html docs/trade_*.html trade_tracker.html trade_*.html portal.html trades_index.json *_trade_data.json trades/*.json
          git diff --staged --quiet || git commit -m "Auto-refresh 1M SONIA dashboard $(date -u +%Y-%m-%dT%H:%MZ)"
          git push || true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
