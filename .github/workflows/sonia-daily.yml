name: Refresh SONIA dashboard (daily)

on:
  schedule:
    # ~10:00 London (BST) on weekdays, after BoE SONIA publish
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pandas numpy requests playwright
          playwright install chromium

      - name: Fetch Barchart data and rebuild dashboard
        run: |
          python analyze_sonia.py
          python build_sonia_dashboard.py
          cp sonia_dashboard.html docs/index.html
          cp sonia_dashboard.html docs/sonia_dashboard.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Commit refreshed JSON (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sonia_dashboard_data.json sonia_dashboard.html docs/
          git diff --staged --quiet || git commit -m "Auto-refresh SONIA dashboard $(date -u +%Y-%m-%d)"
          git push || true

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
